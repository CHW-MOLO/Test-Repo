<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simpel HTML-side</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 700px;
        margin: 40px auto;
        padding: 0 16px;
        line-height: 1.5;
      }

      button {
        margin-top: 12px;
        padding: 10px 14px;
        border: 1px solid #333;
        border-radius: 8px;
        background: #f5f5f5;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Velkommen</h1>
      <p>Det her er en simpel HTML-side med lidt tekst og to knapper.</p>
      <button id="myButton" type="button">Klik mig</button>
      <button id="helloButton" type="button">Sig hej</button>
      <p id="status"></p>
    </main>

    <script>
      const button = document.getElementById("myButton");
      const helloButton = document.getElementById("helloButton");
      const status = document.getElementById("status");

      button.addEventListener("click", () => {
        status.textContent = "Du klikkede på knappen!";
      });

      helloButton.addEventListener("click", () => {
        status.textContent = "Hej med dig!";
      });
    </script>
  </body>
</html>
